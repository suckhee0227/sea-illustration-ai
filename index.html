<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="color-scheme" content="light only" />
    <title>AI 해양 탐사 - 물고기 분류기</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="appContainer">
      <canvas id="appCanvas" width="1" height="1" tabindex="0"></canvas>
      <div id="uiLayer">

        <!-- 상단 네비게이션 바 -->
        <div class="nav-bar" id="nav-bar">
          <span class="nav-title">바다를 위한 인공지능</span>
          <div class="nav-dots" id="nav-dots">
            <span class="nav-dot" data-page="1"></span>
            <span class="nav-dot active" data-page="2">2</span>
            <span class="nav-dot" data-page="3"></span>
            <span class="nav-dot" data-page="4"></span>
            <span class="nav-dot" data-page="5"></span>
            <span class="nav-dot" data-page="6"></span>
            <span class="nav-dot" data-page="7"></span>
            <span class="nav-dot" data-page="8"></span>
          </div>
          <span class="nav-status">완료했어요</span>
        </div>

        <!-- 게임 내 상단 UI (카운터 + 휴지통) -->
        <div class="top-ui">
          <div class="counter">
            <img src="image/ui/ui.1.png" class="counter-bg" alt="">
            <span id="counter-num">0</span>
          </div>
          <div class="trash-icon-btn" id="trash-btn"><img src="image/ui/trash.png" class="trash-img" alt="🗑️"></div>
        </div>

        <!-- 제목 -->
        <div class="title hidden" id="title">이것은 물고기인가요?</div>

        <!-- 인트로 말풍선 -->
        <div class="intro-bubble" id="intro-bubble"></div>

        <!-- 계속하기 버튼 (인트로) -->
        <button class="continue-btn" id="continue-btn">계속하다</button>

        <!-- 분류 버튼들 -->
        <div class="classify-buttons hidden" id="classify-buttons">
          <button class="classify-btn btn-not-fish" id="btn-no">
            <span class="icon">🚫</span>
            <span>Not 물고기</span>
          </button>
          <button class="classify-btn btn-fish" id="btn-yes">
            <span class="icon">✔</span>
            <span>물고기</span>
          </button>
        </div>

        <!-- Did you know 팝업 -->
        <div class="did-you-know hidden" id="did-you-know">
          <img class="dyk-image" id="dyk-image" src="" alt="">
          <h2>Did you know?</h2>
          <div class="fact-box" id="dyk-fact"></div>
          <button class="dyk-btn" id="dyk-btn">계속하다</button>
        </div>

        <!-- 삭제 확인 팝업 -->
        <div class="did-you-know hidden" id="erase-confirm" style="max-width:460px;width:85%;padding-top:18px;padding-bottom:18px">
          <img class="dyk-image show" id="erase-image" src="image/ui/sora.png" alt="" style="transform:rotate(0deg);width:350px;left:-240px;bottom:-130px">
          <h2>Are you sure?</h2>
          <div class="fact-box" style="white-space:normal">Erasing A.I.'s data will permanently delete all training. Is that what you want to do?</div>
          <div class="erase-buttons">
            <button class="erase-btn erase-yes" id="erase-yes">Erase</button>
            <button class="erase-btn erase-no" id="erase-no">Cancel</button>
          </div>
        </div>

        <!-- Let's meet A.I. 툴팁 -->
        <div class="meet-ai-tooltip hidden" id="meet-ai-tooltip">Let's meet A.I.</div>

        <!-- 바다 진입 "해봅시다!" -->
        <div class="ocean-intro hidden" id="ocean-intro">해봅시다!</div>

        <!-- 큰 화살표 (바다 도입부) -->
        <div class="big-arrow hidden" id="big-arrow"><img src="image/ui/arrowdown.png" alt="↓" style="width:100%;height:100%;"></div>

        <!-- 실행 버튼 (바다 도입부) -->
        <button class="continue-btn run-btn-style hidden" id="run-btn">▶ 실행</button>

        <!-- 재생 컨트롤 (바다 실행 중) -->
        <div class="playback-controls hidden" id="playback-controls">
          <button class="play-btn" id="rewind-btn"><canvas class="btn-icon" width="24" height="24"></canvas></button>
          <button class="play-btn big" id="pause-btn"><canvas class="btn-icon" width="28" height="28"></canvas></button>
          <button class="play-btn" id="forward-btn"><canvas class="btn-icon" width="24" height="24"></canvas></button>
        </div>

        <!-- 계속하다 버튼 (바다 실행 중) -->
        <button class="continue-btn hidden" id="ocean-continue-btn">계속하다</button>

        <!-- 리뷰 화면 (2-3 page) -->
        <div class="review-bottom hidden" id="review-bottom">
          <button class="review-train-btn" id="review-train-btn">더 많이 훈련하세요</button>
          <div class="review-bubble" id="review-bubble"></div>
          <button class="review-continue-btn" id="review-continue-btn">계속하다</button>
        </div>
        <div class="review-toggle hidden" id="review-toggle">
          <button class="review-toggle-btn active" id="review-fish-btn">✓</button>
          <button class="review-toggle-btn" id="review-trash-btn">🚫</button>
        </div>

        <!-- 결과 화면 -->
        <div class="result-overlay hidden" id="result-overlay">
          <h2 id="result-title">🎉 AI 학습 완료!</h2>
          <div class="result-score" id="result-score">0%</div>
          <div class="result-detail" id="result-detail"></div>
          <button class="result-btn" id="restart-btn">다시 해보기</button>
        </div>

      </div>
    </div>

    <script defer>
      const SERVER_URL = "http://localhost:8000/client-error";

      const originalConsoleLog = window.console.log;
      const originalConsoleError = window.console.error;
      const originalConsoleWarn = window.console.warn;

      const BATCH_CONFIG = {
        collectionWindow: 5000,
      };

      const sentErrorHistory = new Set();
      let pendingErrors = [];
      let collectionTimer = null;
      let isCollecting = false;

      function getErrorKey(errorData) {
        const { type, message, source, lineno, colno, stack } = errorData;
        const stackHash =
          stack && stack !== "N/A"
            ? stack.split("\n").slice(0, 5).join("|")
            : "";
        const sourceHash = source && source !== "unknown" && source !== "promise" ? source : "";
        return `${type}:${sourceHash}:${message}:${stackHash}`;
      }

      function formatErrorForReport(errorData, index) {
        const { type, message, source, lineno, colno, stack } = errorData;
        const location =
          source && source !== "unknown" && source !== "promise"
            ? `\n\t위치: ${source}:${lineno}:${colno}`
            : "";
        const stackLines = stack && stack !== "N/A" ? stack.split("\n") : [];
        const truncatedStack = stackLines.slice(0, 5).join("\n\t ");
        const stackTrace =
          stackLines.length > 0
            ? `\n\tStack Trace:\n\t${truncatedStack}\n... (Full stack trace truncated)`
            : "";
        return `${index + 1}. [${type}] ${message}${location}${stackTrace}`;
      }

      function sendCollectedErrors() {
        if (pendingErrors.length === 0) {
          isCollecting = false;
          collectionTimer = null;
          return;
        }
        const errorsToSend = [...pendingErrors];
        pendingErrors = [];
        isCollecting = false;
        collectionTimer = null;

        const errorReportBody = errorsToSend
          .map((error, index) => formatErrorForReport(error, index))
          .join("\n\n");
        const header = `==================================================\n런타임 에러가 발생했습니다!: ${errorsToSend.length}개 에러\n==================================================`;
        const finalReport = `${header}\n\n${errorReportBody}`;
        const batchData = {
          type: "error-batch",
          app_version: "1.0.1",
          collected_at: new Date().toISOString(),
          error_count: errorsToSend.length,
          error_report: finalReport,
          errors: errorsToSend,
        };

        originalConsoleLog.call(window.console, `%c📦 에러 수집 완료 - ${errorsToSend.length}건 전송`, "color: blue; font-weight: bold; font-size: 14px;", batchData);
        originalConsoleLog.call(window.console, finalReport);

        try {
          window.parent.postMessage({ source: "typingx-x-iframe", type: "error-batch", payload: { error_report: finalReport, error_count: errorsToSend.length } }, "*");
        } catch (e) {
          originalConsoleWarn.call(window.console, "🚨 부모 창으로 메시지 전송 실패:", e);
        }
      }

      function collectError(data) {
        data.time = new Date().toISOString();
        data.app_version = "1.0.1";
        const errorKey = getErrorKey(data);
        if (sentErrorHistory.has(errorKey)) return;
        sentErrorHistory.add(errorKey);
        pendingErrors.push(data);
        originalConsoleLog.call(window.console, `%c🆕 새 에러 감지: ${data.message}`, "color: orange; font-weight: bold;");
        if (!isCollecting) {
          isCollecting = true;
          collectionTimer = setTimeout(() => { sendCollectedErrors(); }, BATCH_CONFIG.collectionWindow);
        }
      }

      window.onerror = function (message, source, lineno, colno, error) {
        collectError({ type: "js-error", message: String(message), source: source || "unknown", lineno: lineno || 0, colno: colno || 0, stack: error ? error.stack : "N/A" });
        return false;
      };
      window.addEventListener("unhandledrejection", function (event) {
        collectError({ type: "unhandledrejection", message: event.reason ? String(event.reason) : "Promise rejected", source: "promise", lineno: 0, colno: 0, stack: event.reason && event.reason.stack ? event.reason.stack : "N/A" });
      });
      window.addEventListener("error", function (event) {
        if (event.target !== window) {
          collectError({ type: "resource-error", message: `Failed to load: ${event.target.tagName}`, source: event.target.src || event.target.href || "unknown", lineno: 0, colno: 0, stack: "N/A" });
        }
      }, true);
      window.console.error = function (...args) {
        originalConsoleError.apply(window.console, args);
        collectError({ type: "console-error", message: args.map(a => String(a)).join(" "), source: "console.error", lineno: 0, colno: 0, stack: "N/A" });
      };
      window.console.warn = function (...args) {
        originalConsoleWarn.apply(window.console, args);
        const message = args.map(a => String(a)).join(" ");
        if (["deprecated","memory","performance","leak","failed"].some(k => message.toLowerCase().includes(k))) {
          collectError({ type: "console-warn-critical", message, source: "console.warn", lineno: 0, colno: 0, stack: "N/A" });
        }
      };
      window.addEventListener("beforeunload", function () {
        if (pendingErrors.length > 0) {
          if (collectionTimer) { clearTimeout(collectionTimer); collectionTimer = null; }
          const errorReportBody = pendingErrors.map((e, i) => formatErrorForReport(e, i)).join("\n\n");
          const header = `==================================================\n런타임 에러가 발생했습니다!: ${pendingErrors.length}개 에러\n==================================================`;
          navigator.sendBeacon(SERVER_URL, JSON.stringify({ type: "error-batch-final", app_version: "1.0.1", collected_at: new Date().toISOString(), error_count: pendingErrors.length, error_report: `${header}\n\n${errorReportBody}`, errors: pendingErrors }));
          pendingErrors = []; isCollecting = false;
        }
      });
      document.addEventListener("visibilitychange", function () {
        if (document.hidden && pendingErrors.length > 0) {
          if (collectionTimer) { clearTimeout(collectionTimer); collectionTimer = null; }
          sendCollectedErrors();
        }
      });

      const appCanvas = document.getElementById("appCanvas");
      if (appCanvas) {
        const originalGetContext = appCanvas.getContext.bind(appCanvas);
        appCanvas.getContext = function (type, attrs) {
          if (type === "webgl" || type === "webgl2" || type === "experimental-webgl") {
            attrs = Object.assign({}, attrs, { preserveDrawingBuffer: true });
          }
          return originalGetContext(type, attrs);
        };
      }
    </script>

    <script type="importmap">
      {
        "imports": {
          "html-to-image": "https://cdn.jsdelivr.net/npm/html-to-image@1.11.13/+esm",
          "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
          "three/": "https://cdn.jsdelivr.net/npm/three@0.170.0/",
          "three/examples/jsm/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/",
          "cannon-es": "https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js",
          "howler": "https://cdn.jsdelivr.net/npm/howler@2.2.4/+esm",
          "tone": "https://cdn.jsdelivr.net/npm/tone@14.7.39/+esm",
          "gsap": "https://cdn.jsdelivr.net/npm/gsap@3.12.5/+esm",
          "mathjs": "https://cdn.jsdelivr.net/npm/mathjs@14.5.2/+esm",
          "canvas-confetti": "https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/+esm"
        }
      }
    </script>

    <script type="module" src="main.js"></script>
  </body>
</html>
